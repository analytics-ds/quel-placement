baseURL = "https://analytics-ds.github.io/quel-placement/"
title = "Quel Placement"
theme = "quel-placement"

defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
enableEmoji = false

[languages]
  [languages.fr]
    languageCode = "fr-FR"
    languageName = "Francais"
    weight = 1
    contentDir = "content"
    title = "Quel Placement"
    [languages.fr.params]
      description = "Le blog reference pour comprendre la finance, l'investissement et choisir les meilleurs placements."

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 2
    contentDir = "content/en"
    title = "Quel Placement"
    [languages.en.params]
      description = "The reference blog to understand finance, investing and choose the best placements."

[taxonomies]
  category = "categories"
  tag = "tags"

# Menu FR
[[languages.fr.menus.main]]
  name = "Fiscalite"
  url = "/categories/fiscalite/"
  weight = 1
[[languages.fr.menus.main]]
  name = "Private Equity"
  url = "/categories/private-equity/"
  weight = 2
[[languages.fr.menus.main]]
  name = "Epargne"
  url = "/categories/epargne/"
  weight = 3
[[languages.fr.menus.main]]
  name = "Credit"
  url = "/categories/credit/"
  weight = 4
[[languages.fr.menus.main]]
  name = "Compte bancaire"
  url = "/categories/compte-bancaire/"
  weight = 5
[[languages.fr.menus.main]]
  name = "Assurance"
  url = "/categories/assurance/"
  weight = 6
[[languages.fr.menus.main]]
  name = "Lexique"
  url = "/lexique/"
  weight = 98
[[languages.fr.menus.main]]
  name = "A propos"
  url = "/a-propos/"
  weight = 99

# Menu EN (only essentials since taxonomy pages are FR-only)
[[languages.en.menus.main]]
  name = "Blog"
  url = "/en/blog/"
  weight = 1
[[languages.en.menus.main]]
  name = "Glossary"
  url = "/en/glossary/"
  weight = 98
[[languages.en.menus.main]]
  name = "About"
  url = "/en/about/"
  weight = 99

[params]
  default_og_image = "/images/og-default.svg"
  logo = "/favicon.svg"
  founding_year = "2026"
  expertise = ["Finance personnelle", "Investissement", "Fiscalite", "Epargne", "Private Equity", "Credit", "Assurance"]
  og_locale_alternate = "en_US"

[related]
  includeNewer = true
  threshold = 80
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# Desactiver la minification XML pour avoir un sitemap lisible
[minify]
  disableXML = true

